<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Group Uploader</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#f0f2f5; min-height:100vh; padding:32px 16px; }
.card { background:#fff; border-radius:12px; box-shadow:0 2px 16px rgba(0,0,0,.10); width:100%; max-width:680px; margin:0 auto; overflow:hidden; }
.card-header { background:#ee4d2d; padding:20px 28px; }
.card-header h1 { color:#fff; font-size:18px; font-weight:600; }
.card-header p  { color:rgba(255,255,255,.75); font-size:12px; margin-top:2px; }
.card-body { padding:28px; }
label { display:block; font-size:13px; font-weight:500; color:#333; margin-bottom:6px; }
.req { color:#ee4d2d; }
.field { margin-bottom:16px; }
input[type="text"],input[type="url"],select,textarea {
  width:100%; padding:10px 12px; border:1px solid #d9d9d9; border-radius:8px;
  font-size:14px; color:#222; outline:none; transition:border-color .2s; background:#fff;
}
input:focus,select:focus,textarea:focus { border-color:#ee4d2d; box-shadow:0 0 0 2px rgba(238,77,45,.12); }
textarea { resize:vertical; min-height:72px; font-family:monospace; font-size:12px; }
.row { display:flex; gap:8px; align-items:flex-end; }
.row input,.row select { flex:1; }
.btn { padding:10px 18px; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:.15s; }
.btn-primary { background:#ee4d2d; color:#fff; width:100%; margin-top:4px; }
.btn-primary:hover { background:#d94327; }
.btn-primary:disabled { opacity:.6; cursor:not-allowed; }
.btn-sm { padding:8px 12px; font-size:12px; background:#fff; border:1px solid #d9d9d9; color:#555; border-radius:6px; cursor:pointer; white-space:nowrap; }
.btn-sm:hover { border-color:#ee4d2d; color:#ee4d2d; }
.btn-add { width:100%; padding:10px; border:1.5px dashed #d9d9d9; border-radius:8px; background:#fff; color:#888; font-size:13px; cursor:pointer; margin-bottom:16px; }
.btn-add:hover { border-color:#ee4d2d; color:#ee4d2d; }
.section-card { border:1px solid #e8e8e8; border-radius:10px; padding:16px; margin-bottom:10px; position:relative; background:#fafafa; }
.section-num { position:absolute; top:-10px; left:14px; background:#ee4d2d; color:#fff; font-size:11px; font-weight:700; padding:2px 8px; border-radius:10px; }
.section-remove { position:absolute; top:10px; right:12px; background:none; border:none; cursor:pointer; color:#bbb; font-size:16px; }
.section-remove:hover { color:#ee4d2d; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(max-width:480px){ .grid2 { grid-template-columns:1fr; } }
.toggle-row { display:flex; align-items:center; gap:8px; margin-bottom:16px; font-size:13px; color:#555; }
.divider { height:1px; background:#f0f0f0; margin:20px 0; }
#logBox { display:none; background:#111; border-radius:8px; padding:14px 16px; font-family:monospace; font-size:12px; max-height:260px; overflow-y:auto; margin-top:16px; }
#logBox.visible { display:block; }
.log-line { padding:1px 0; line-height:1.6; color:#ccc; }
.log-line.success { color:#4ade80; }
.log-line.error   { color:#f87171; }
.log-line.sep     { color:#facc15; }
.log-line.info    { color:#60a5fa; }
#resultBox { margin-top:12px; }
.res-card { background:#f0fdf4; border:1px solid #86efac; border-radius:8px; padding:14px 16px; margin-bottom:8px; }
.res-card h4 { font-size:13px; font-weight:600; color:#166534; margin-bottom:4px; }
.res-card p  { font-size:12px; color:#15803d; }
.spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:6px; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <h1>🍊 User Group Uploader</h1>
    <p>Upload số điện thoại từ Google Sheet lên ShopeeFood User Tag</p>
  </div>
  <div class="card-body">

    <div class="field">
      <label>Cookie Token <span class="req">*</span></label>
      <textarea id="cookie_token" placeholder="Paste cookie từ DevTools (F12 → Network → Request Headers → Cookie)"></textarea>
    </div>

    <div class="field">
      <label>Google Sheet URL <span class="req">*</span></label>
      <div class="row">
        <input type="url" id="sheet_url" placeholder="https://docs.google.com/spreadsheets/d/...">
        <button class="btn btn-sm" id="btnFetch" onclick="fetchTabs()">Lấy tabs</button>
      </div>
    </div>

    <div class="divider"></div>

    <div id="sectionList"></div>
    <button class="btn-add" onclick="addSection()">+ Thêm Section</button>

    <div class="toggle-row">
      <input type="checkbox" id="clearBefore" checked>
      <label for="clearBefore" style="margin:0">Xóa danh sách cũ trước khi upload</label>
    </div>

    <button class="btn btn-primary" id="btnSubmit" onclick="doUpload()">🚀 Bắt đầu Upload</button>

    <div id="logBox"></div>
    <div id="resultBox"></div>
  </div>
</div>

<script>
var availableTabs = [];
var sectionCount  = 0;

function todayDDMM() {
  var d = new Date();
  return String(d.getDate()).padStart(2,'0') + String(d.getMonth()+1).padStart(2,'0');
}

function fetchTabs() {
  var url = document.getElementById('sheet_url').value.trim();
  if (!url) { alert('Nhập Google Sheet URL'); return; }
  var btn = document.getElementById('btnFetch');
  btn.disabled = true; btn.textContent = '⏳';
  google.script.run
    .withSuccessHandler(function(tabs) {
      availableTabs = tabs;
      document.querySelectorAll('.tab-select').forEach(updateTabSelect);
      btn.disabled = false; btn.textContent = 'Lấy tabs';
    })
    .withFailureHandler(function(err) {
      alert('Lỗi: ' + err.message);
      btn.disabled = false; btn.textContent = 'Lấy tabs';
    })
    .getTabs(url);
}

function updateTabSelect(sel) {
  var cur = sel.value;
  sel.innerHTML = '<option value="">-- Chọn tab --</option>';
  availableTabs.forEach(function(t) {
    var opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    if (t === cur) opt.selected = true;
    sel.appendChild(opt);
  });
}

function addSection() {
  sectionCount++;
  var n = sectionCount;
  var div = document.createElement('div');
  div.className = 'section-card'; div.id = 'sec-' + n;
  div.innerHTML =
    '<span class="section-num">#' + n + '</span>' +
    '<button class="section-remove" onclick="document.getElementById(\'sec-' + n + '\').remove()">✕</button>' +
    '<div class="grid2">' +
      '<div class="field" style="margin:0">' +
        '<label>Tên tab <span class="req">*</span></label>' +
        '<select class="tab-select" id="tab_' + n + '"><option value="">-- Chọn tab --</option></select>' +
      '</div>' +
      '<div class="field" style="margin:0">' +
        '<label>User Group Name <span class="req">*</span></label>' +
        '<input type="text" id="gid_' + n + '" placeholder="vd: Mai_Test_Hihub">' +
      '</div>' +
    '</div>' +
    '<div style="margin-top:10px;display:flex;gap:8px;justify-content:flex-end">' +
      '<button class="btn-sm" onclick="debugTab(' + n + ')">🔍 Debug</button>' +
      '<button class="btn-sm" onclick="downloadCSV(' + n + ')">⬇ Download CSV</button>' +
    '</div>';
  document.getElementById('sectionList').appendChild(div);
  var sel = document.getElementById('tab_' + n);
  if (availableTabs.length) {
    updateTabSelect(sel);
    var today = availableTabs.find(function(t){ return t.replace(/\D/g,'').startsWith(todayDDMM()); });
    if (today) sel.value = today;
  }
}

function collectSections() {
  var sections = [];
  document.querySelectorAll('.section-card').forEach(function(card) {
    var n   = card.id.replace('sec-','');
    var tab = (document.getElementById('tab_'+n)||{}).value||'';
    var gid = (document.getElementById('gid_'+n)||{}).value||'';
    if (tab.trim() && gid.trim()) sections.push({ tabName: tab.trim(), groupName: gid.trim() });
  });
  return sections;
}

function addLog(msg, cls) {
  var box = document.getElementById('logBox');
  var line = document.createElement('div');
  line.className = 'log-line' + (cls ? ' ' + cls : '');
  line.textContent = msg;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function doUpload() {
  var sheetUrl   = document.getElementById('sheet_url').value.trim();
  var cookieStr  = document.getElementById('cookie_token').value.trim();
  var sections   = collectSections();
  var clearBefore = document.getElementById('clearBefore').checked;

  if (!sheetUrl)   { alert('Nhập Google Sheet URL'); return; }
  if (!cookieStr)  { alert('Nhập Cookie Token'); return; }
  if (!sections.length) { alert('Điền ít nhất 1 section'); return; }

  var logBox = document.getElementById('logBox');
  var resultBox = document.getElementById('resultBox');
  logBox.innerHTML = ''; logBox.classList.add('visible');
  resultBox.innerHTML = '';
  var btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Đang xử lý...';

  google.script.run
    .withSuccessHandler(function(r) {
      (r.logs||[]).forEach(function(msg) {
        var cls = msg.includes('✓') ? 'success' : msg.includes('❌') ? 'error' : msg.startsWith('──') ? 'sep' : msg.startsWith('Upload')||msg.startsWith('Lấy')||msg.startsWith('Xóa')||msg.startsWith('Chờ') ? 'info' : '';
        addLog(msg, cls);
      });
      if (r.ok) {
        (r.results||[]).forEach(function(res) {
          resultBox.innerHTML += '<div class="res-card"><h4>✅ ' + res.groupName + '</h4><p>Tab: ' + res.tab + ' | ' + res.total + ' số (TNV: ' + res.tnv + ', User: ' + res.user + ')</p></div>';
        });
      } else {
        resultBox.innerHTML = '<div style="padding:14px;background:#fff1f2;border:1px solid #fca5a5;border-radius:8px;color:#991b1b;font-size:13px;">❌ ' + r.error + '</div>';
      }
      btn.disabled = false; btn.innerHTML = '🚀 Bắt đầu Upload';
    })
    .withFailureHandler(function(err) {
      addLog('❌ ' + err.message, 'error');
      btn.disabled = false; btn.innerHTML = '🚀 Bắt đầu Upload';
    })
    .runUpload({ sheetUrl: sheetUrl, cookieStr: cookieStr, sections: sections, clearBefore: clearBefore });
}

function downloadCSV(n) {
  var sheetUrl = document.getElementById('sheet_url').value.trim();
  var tabName  = (document.getElementById('tab_'+n)||{}).value||'';
  if (!sheetUrl) { alert('Nhập Google Sheet URL trước'); return; }
  if (!tabName)  { alert('Chọn tab trước'); return; }
  var btn = event.target;
  btn.disabled = true; btn.textContent = '⏳';
  google.script.run
    .withSuccessHandler(function(r) {
      var csv = 'User ID\n' + r.phones.join('\n');
      var blob = new Blob([csv], { type: 'text/csv' });
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement('a');
      a.href = url; a.download = tabName + '.csv'; a.click();
      URL.revokeObjectURL(url);
      btn.disabled = false; btn.textContent = '⬇ Download CSV';
    })
    .withFailureHandler(function(err) {
      alert('Lỗi: ' + err.message);
      btn.disabled = false; btn.textContent = '⬇ Download CSV';
    })
    .extractPhones(sheetUrl, tabName);
}

  function debugTab(n) {
    var sheetUrl = document.getElementById('sheet_url').value.trim();
    var tabName  = (document.getElementById('tab_'+n)||{}).value||'';
    if (!sheetUrl || !tabName) { alert('Nhập Sheet URL và chọn tab trước'); return; }
    var btn = event.target;
    btn.disabled = true; btn.textContent = '⏳';
    google.script.run
      .withSuccessHandler(function(r) {
        alert(JSON.stringify(r, null, 2));
        btn.disabled = false; btn.textContent = '🔍 Debug';
      })
      .withFailureHandler(function(err) {
        alert('Lỗi: ' + err.message);
        btn.disabled = false; btn.textContent = '🔍 Debug';
      })
      .debugTab(sheetUrl, tabName);
  }
</script>
</body>
</html>
